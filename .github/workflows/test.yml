name: Test-Terraform-Provider

on:
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  test-terraform-provider:
    strategy:
      matrix:
        go-version: [ '1.24.13' ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    name: Test with Go ${{ matrix.go-version }}
    permissions:
      contents: read

    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download dependencies
      run: go mod download

    - name: Build provider
      run: go build -v .

    - name: Run go vet
      run: go vet ./...

    - name: Run go fmt check
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Go files are not formatted:"
          gofmt -s -d .
          exit 1
        fi

    - name: Run unit tests
      run: go test -v -timeout=10m ./...

    - name: Run provider validation
      run: go test -v -run TestProvider ./secretsmanager

  # Acceptance tests require secrets and test data
  # Run these manually with TF_ACC=1 and KEEPER_CREDENTIAL set locally
  # or add them to a separate protected workflow with secrets
